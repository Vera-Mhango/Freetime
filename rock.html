<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>for My Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #2B2823;
    --bg-soft: #332F28;
    --bone: #F4EFE4;
    --bone-dim: #C9C2B2;
    --clay: #B8915F;
    --sage: #7A8B7A;
    --pink: #D4537E;
    --serif: 'Source Serif 4', serif;
    --sans: 'Inter', sans-serif;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    height: 100%;
    background: var(--bg);
    color: var(--bone);
    font-family: var(--sans);
    overflow-x: hidden;
  }

  body{
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vh 1.5rem;
    position: relative;
  }

  body::before{
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(244,239,228,0.05), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.35), transparent 70%);
    z-index: 0;
  }

  .scene{
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .eyebrow{
    font-family: var(--sans);
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--bone-dim);
    opacity: 0.7;
    margin-bottom: 2.5rem;
  }

  .rock-wrap{
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .rock-wrap svg{
    width: 170px;
    height: 170px;
    transition: transform 0.45s cubic-bezier(.22,1,.36,1);
    transform: rotate(-4deg);
    filter: drop-shadow(0 14px 22px rgba(0,0,0,0.45));
  }

  .rock-wrap.settled svg{ transform: rotate(-4deg) scale(1); }

  .rock-wrap:active svg{ transform: rotate(2deg) scale(0.97); }

  .rock-wrap.turn-1 svg{ transform: rotate(6deg); }
  .rock-wrap.turn-2 svg{ transform: rotate(-9deg); }
  .rock-wrap.turn-3 svg{ transform: rotate(4deg); }
  .rock-wrap.turn-4 svg{ transform: rotate(-2deg) scale(1.04); }

  .rock-shadow{
    position: absolute;
    bottom: 18px;
    width: 110px;
    height: 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 50%;
    filter: blur(6px);
    transition: transform 0.45s ease;
  }

  .tap-hint{
    margin-top: 1.75rem;
    font-size: 0.8rem;
    color: var(--bone-dim);
    opacity: 0.65;
    letter-spacing: 0.02em;
    transition: opacity 0.4s ease;
  }

  .tap-hint.hidden{ opacity: 0; }

  .message-box{
    margin-top: 2.25rem;
    min-height: 4.5em;
    max-width: 360px;
  }

  .message{
    font-family: var(--serif);
    font-size: 1.18rem;
    line-height: 1.65;
    font-weight: 400;
    color: var(--bone);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .message.visible{
    opacity: 1;
    transform: translateY(0);
  }

  .message .accent{
    color: var(--pink);
    font-style: italic;
  }

  .progress{
    display: flex;
    gap: 6px;
    margin-top: 2rem;
  }

  .dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--bone-dim);
    opacity: 0.25;
    transition: opacity 0.3s ease, background 0.3s ease;
  }

  .dot.done{ opacity: 0.9; background: var(--clay); }


  .finale{
    margin-top: 2.5rem;
    width: 100%;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.7s ease, max-height 0.7s ease;
  }

  .finale.visible{
    opacity: 1;
    max-height: 600px;
  }

  .countdown-card{
    background: var(--bg-soft);
    border: 1px solid rgba(244,239,228,0.08);
    border-radius: 14px;
    padding: 1.5rem 1.25rem;
    width: 100%;
  }

  .countdown-label{
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.4rem;
  }

  .countdown-number{
    font-family: var(--serif);
    font-size: 2.6rem;
    font-weight: 600;
    color: var(--bone);
    line-height: 1.1;
  }

  .countdown-sub{
    font-size: 0.85rem;
    color: var(--bone-dim);
    margin-top: 0.6rem;
    line-height: 1.5;
  }

  .signature{
    margin-top: 2.25rem;
    font-family: var(--serif);
    font-size: 1.3rem;
    line-height: 1.6;
    color: var(--bone);
  }

  .signature .from{
    display: block;
    margin-top: 0.6rem;
    font-size: 1rem;
    color: var(--clay);
    font-style: italic;
  }

  .replay{
    margin-top: 2.5rem;
    background: none;
    border: 1px solid rgba(244,239,228,0.18);
    color: var(--bone-dim);
    font-family: var(--sans);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    padding: 0.6rem 1.1rem;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.25s ease, color 0.25s ease;
  }

  .replay:hover{
    border-color: var(--clay);
    color: var(--bone);
  }

  .replay:focus-visible,
  .rock-wrap:focus-visible{
    outline: 2px solid var(--clay);
    outline-offset: 4px;
  }

  @media (max-width: 380px){
    .message{ font-size: 1.05rem; }
    .countdown-number{ font-size: 2.2rem; }
  }

  @media (prefers-reduced-motion: reduce){
    .rock-wrap svg,
    .message,
    .finale,
    .rock-shadow{ transition: none; }
  }
</style>
</head>
<body>

  <main class="scene">
    <p class="eyebrow">a small thing, from your girl</p>

    <div class="rock-wrap" id="rock" role="button" tabindex="0" aria-label="Tap the rock to continue">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 28 C76 26 92 38 94 56 C96 74 84 90 64 92 C44 94 28 82 26 62 C24 44 40 30 60 28 Z" fill="#8E8A7E"/>
        <path d="M60 28 C76 26 92 38 94 56 C95 64 92 72 86 78 C82 64 70 50 52 46 C44 44 36 46 30 50 C36 36 46 30 60 28 Z" fill="#B0AB9C"/>
        <ellipse cx="48" cy="50" rx="7" ry="3.4" fill="#D8D2C2" opacity="0.65"/>
        <ellipse cx="74" cy="64" rx="4.5" ry="2.2" fill="#54514A" opacity="0.45"/>
        <ellipse cx="58" cy="76" rx="3.5" ry="2" fill="#54514A" opacity="0.35"/>
        <ellipse cx="40" cy="68" rx="2.5" ry="4" fill="#54514A" opacity="0.25"/>
      </svg>
    </div>
    <div class="rock-shadow"></div>

    <p class="tap-hint" id="hint">tap the rock</p>

    <div class="message-box">
      <p class="message" id="message"></p>
    </div>

    <div class="progress" id="progress"></div>

    <div class="finale" id="finale">
      <div class="countdown-card">
        <div class="countdown-label">days since we last saw and held eachother</div>
        <div class="countdown-number" id="days">42</div>
        <div class="countdown-sub">and hopefully, just a handful left<br>until I see you again</div>
      </div>

      <p class="signature">
        I love you and I miss you.
        <span class="from">— your girl</span>
      </p>

      <button class="replay" id="replay">read it again</button>
    </div>
  </main>

<script>
(function(){
  var DAYS_APART = 42; 
  var lines = [
    "We were eleven.",
    "At least I was when I first met you. I found you annoying. No, scratch that— I didn\u2019t care much about your existence.",
    "You were a friend of a friend, and then a friend. We didn\u2019t talk much, but enough for me to remember you.",
    "Then one day, you were in my new friend\u2019s room. Well, technically you were his roommate, but still.",
    "It felt like fate.",
    "A familiar face in an unfamiliar place, even though I hadn\u2019t seen you in almost four years.",
    "I liked you in first year. You gave me a place to nap. And then you gave me a rock.",
    "I don\u2019t know why I kept it. My friends told me it was stupid, that it was just a rock.",
    "Maybe it was.",
    "Or maybe some part of me knew. Maybe I knew that one day I wouldn\u2019t regret keeping it. Maybe I knew that someday you would mean more to me than you did in that moment.",
    "I love you, no— ",
    "I\u2019m in love with you, my love, and I hope I never get out of it.",
    "Because just like that small, insignificant rock, you\u2019ve become one of the most precious things I\u2019ve ever chosen to keep."
  ];

  var rock = document.getElementById('rock');
  var hint = document.getElementById('hint');
  var messageEl = document.getElementById('message');
  var progressEl = document.getElementById('progress');
  var finale = document.getElementById('finale');
  var daysEl = document.getElementById('days');
  var replayBtn = document.getElementById('replay');

  daysEl.textContent = DAYS_APART;

  var step = 0;
  var typing = false;
  var typeTimer = null;

  lines.forEach(function(_, idx){
    var d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + idx;
    progressEl.appendChild(d);
  });

  function typeLine(html, plain){
    typing = true;
    messageEl.innerHTML = '';
    messageEl.classList.add('visible');
    var i = 0;
    clearInterval(typeTimer);
    typeTimer = setInterval(function(){
      i++;
      messageEl.textContent = plain.slice(0, i);
      if(i >= plain.length){
        clearInterval(typeTimer);
        messageEl.innerHTML = html;
        typing = false;
      }
    }, 16);
  }

  function stripTags(html){
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function advance(){
    if(typing) return;

    if(step >= lines.length){
      return; 
    }

    hint.classList.add('hidden');

    rock.classList.remove('turn-1','turn-2','turn-3','turn-4');
    var turnClass = 'turn-' + ((step % 4) + 1);
    rock.classList.add(turnClass);

    var raw = lines[step];
    typeLine(raw, stripTags(raw));

    var dot = document.getElementById('dot-' + step);
    if(dot) dot.classList.add('done');

    step++;

    if(step >= lines.length){
      setTimeout(function(){
        finale.classList.add('visible');
      }, 1400);
    }
  }

  function reset(){
    step = 0;
    clearInterval(typeTimer);
    typing = false;
    messageEl.classList.remove('visible');
    messageEl.innerHTML = '';
    hint.classList.remove('hidden');
    finale.classList.remove('visible');
    rock.classList.remove('turn-1','turn-2','turn-3','turn-4');
    document.querySelectorAll('.dot').forEach(function(d){ d.classList.remove('done'); });
    window.scrollTo({top:0, behavior:'smooth'});
  }

  rock.addEventListener('click', advance);
  rock.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      advance();
    }
  });

  replayBtn.addEventListener('click', reset);
})();
</script>

</body>
</html>
