<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To My Favorite Boy 💕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ffe6f0, #ffd1e3);
      font-family: 'Poppins', sans-serif;
      color: #c41e3d;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      z-index: 10;
    }

    .heart {
      font-size: 120px;
      animation: beat 1.2s infinite;
      display: inline-block;
      margin-bottom: 20px;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 2.8em;
      margin: 10px 0;
      text-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
    }

    .message {
      font-size: 1.4em;
      max-width: 600px;
      margin: 25px auto;
      opacity: 0;
      transition: all 1.5s ease;
      min-height: 60px;
    }

    .visible {
      opacity: 1;
    }

    .hearts {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .float-heart {
      position: absolute;
      font-size: 30px;
      animation: floatUp 8s linear forwards;
      opacity: 0.8;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); }
      100% { transform: translateY(-100px) rotate(360deg); }
    }

    .final {
      margin-top: 40px;
      font-size: 1.6em;
      color: #e91e63;
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>
  
  <div class="container">
    <div class="heart">❤️</div>
    <h1>I Miss You</h1>
    
    <div class="message" id="msg1">Hey baby... 🥺</div>
    <div class="message" id="msg2">Every second without you feels too long</div>
    <div class="message" id="msg3">I keep thinking about your smile</div>
    <div class="message" id="msg4">And how safe I feel with you</div>
    <div class="message" id="msg5">I love you more than all the stars 🌌</div>
    <div class="message" id="msg6">Can't wait to be back in your arms 💕</div>
    
    <div class="final" id="final">
      You're my favorite person in the whole world<br>
      <strong>I LOVE YOU SO MUCH</strong> ❤️
    </div>
  </div>

  <script>
    // Create floating hearts
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('float-heart');
      heart.textContent = ['❤️', '💗', '💖', '💘', '💝'][Math.floor(Math.random()*5)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 6 + 7) + 's';
      heart.style.fontSize = (Math.random() * 25 + 25) + 'px';
      document.getElementById('hearts').appendChild(heart);
      
      setTimeout(() => heart.remove(), 15000);
    }

    // Show messages one by one
    const messages = document.querySelectorAll('.message');
    let i = 0;
    
    function showNextMessage() {
      if (i < messages.length) {
        messages[i].classList.add('visible');
        i++;
        setTimeout(showNextMessage, 1800);
      }
    }

    // Start everything
    setInterval(createHeart, 300);
    setTimeout(() => {
      showNextMessage();
    }, 800);

    // Click anywhere for extra hearts
    document.addEventListener('click', () => {
      for (let j = 0; j < 8; j++) {
        setTimeout(createHeart, j * 80);
      }
    });

    // Personalized line - EDIT THIS!
    console.log("%c💕 Made with love for my amazing boyfriend 💕", "color: #e91e63; font-size: 14px;");
  </script>
</body>
</html>
